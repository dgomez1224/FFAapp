# When we push to main, trigger Zorya to sync /sports from this repo.
# In FFAapp repo Settings → Secrets and variables → Actions: add ZORYA_SYNC_PAT
# (a GitHub PAT with repo scope, so this workflow can trigger maximizo/Zorya-Website).
name: Trigger Zorya sports sync

on:
  push:
    branches: [main]

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Zorya sync workflow
        run: |
          curl -sL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.ZORYA_SYNC_PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/maximizo/Zorya-Website/dispatches \
            -d '{"event_type":"sync-sports"}'
